server {
  listen 80;
  server_name your-domain.example;

  root /var/www/ratisa/dist;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' https://buergerinfo.stadt-koeln.de; font-src 'self' data:; frame-ancestors 'self' https://digitalheritagelab.com; img-src 'self' data: https:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; form-action 'self'" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' https://buergerinfo.stadt-koeln.de; font-src 'self' data:; frame-ancestors 'self' https://digitalheritagelab.com; img-src 'self' data: https:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # Critical for OParl API access in browser:
  # this block must be above the generic "/" SPA block.
  location /oparl/ {
    proxy_pass https://buergerinfo.stadt-koeln.de/oparl/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host buergerinfo.stadt-koeln.de;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy AI requests to the separate HTTP backend service.
  location /ai/ {
    proxy_pass http://127.0.0.1:3333/ai/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Static assets and SPA fallback.
  location / {
    try_files $uri /index.html;
  }
}
