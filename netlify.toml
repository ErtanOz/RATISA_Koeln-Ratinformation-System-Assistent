[build]
  command = "npm ci --prefix mcp-server-netlify && npm run build"
  functions = "mcp-server-netlify/netlify/functions"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; connect-src 'self' https://buergerinfo.stadt-koeln.de; font-src 'self' data:; frame-ancestors 'self' https://digitalheritagelab.com; img-src 'self' data: https:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; form-action 'self'"
    Permissions-Policy = "camera=(), geolocation=(), microphone=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/oparl/*"
  to = "https://buergerinfo.stadt-koeln.de/oparl/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/mcp-http"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/mcp-http/*"
  to = "/.netlify/functions/mcp/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ai/*"
  to = "/.netlify/functions/mcp/ai/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
